name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-14
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Install CocoaPods dependencies
        run: pod install --project-directory=apps/mobile/ios --deployment

      - name: Build iOS app for CodeQL
        run: >-
          xcodebuild
          -workspace apps/mobile/ios/BeachRanker.xcworkspace
          -scheme BeachRanker
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath "$RUNNER_TEMP/BeachRankerDerivedData"
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          COMPILER_INDEX_STORE_ENABLE=NO
          build

      - name: Analyze
        uses: github/codeql-action/analyze@v3
