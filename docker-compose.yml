services:
  postgres:
    image: postgres:16-alpine
    container_name: beachranker-postgres
    environment:
      POSTGRES_DB: beachranker
      POSTGRES_USER: beachranker
      POSTGRES_PASSWORD: beachranker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beachranker -d beachranker"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - beachranker_postgres:/var/lib/postgresql/data

volumes:
  beachranker_postgres:
